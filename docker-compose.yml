version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trainmonitor_db
    environment:
      POSTGRES_DB: ${DB_NAME:-trainmonitor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trainmonitor_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trainmonitor_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo_data &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trainmonitor_celery_worker
    command: celery -A config.celery worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trainmonitor_celery_beat
    command: celery -A config.celery beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trainmonitor_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: trainmonitor_mqtt
    ports:
      - "1883:1883"
    command: mosquitto -c /mosquitto-no-auth.conf
    restart: unless-stopped

  mqtt_listener:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trainmonitor_mqtt_listener
    command: python manage.py mqtt_listener
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend
      - mqtt
    restart: unless-stopped

volumes:
  postgres_data:
