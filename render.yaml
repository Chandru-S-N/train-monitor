services:
  # Django Daphne Web Service (Daphne runs ASGI/WebSockets + in-process Background Tasks)
  - type: web
    name: train-monitor-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && python manage.py seed_demo_data && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: sqlite
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: IN_PROCESS_SIMULATOR
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
